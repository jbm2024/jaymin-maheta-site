<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("jm-theme");
        var theme = stored || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-bs-theme", theme);
      } catch (e) {}
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Jaymin Maheta</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://esm.sh" crossorigin />
  <link rel="preconnect" href="https://mkuoqkyvgexcxxylxvbc.supabase.co" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#14161c" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4"
    }
  }
  </script>

  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>
  <!-- Navbar -->
  <header class="navbar admin-navbar border-bottom px-3 px-md-4 py-3">
    <div class="d-flex align-items-center gap-3">
      <span class="fw-bold fs-5 admin-mono">JM</span>
      <span class="admin-label-mono">admin</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <a href="index.html" class="admin-label-mono link-body-emphasis text-decoration-none">&larr; Back to site</a>
      <button type="button" data-theme-toggle aria-label="Toggle color theme" class="btn btn-outline-secondary btn-sm rounded-circle admin-icon-btn">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
      </button>
      <button type="button" data-logout-btn class="d-none btn btn-outline-secondary btn-sm">Log out</button>
    </div>
  </header>

  <!-- Login gate -->
  <section data-login-view class="admin-auth-panel mx-auto mt-5 px-3">
    <h1 class="admin-mono fw-bold fs-3">Admin sign in</h1>
    <p class="mt-2 text-body-secondary">Sign in with the admin account created in the Supabase dashboard.</p>
    <form data-login-form class="mt-4">
      <div class="mb-3">
        <label for="login-email" class="form-label admin-field-label">Email</label>
        <input id="login-email" name="email" type="email" required autocomplete="username" class="form-control" />
      </div>
      <div class="mb-3">
        <label for="login-password" class="form-label admin-field-label">Password</label>
        <input id="login-password" name="password" type="password" required autocomplete="current-password" class="form-control" />
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
      <p data-login-status role="alert" class="admin-status mt-2"></p>
    </form>
  </section>

  <section data-unauthorized-view class="d-none admin-auth-panel mx-auto mt-5 px-3 text-center">
    <h1 class="admin-mono fw-bold fs-4">Not an admin account</h1>
    <p class="mt-2 text-body-secondary">This account can sign in but isn't in the <code>admin_users</code> allowlist, so it can't manage content. Ask an existing admin to add it, or sign in with the admin account.</p>
    <button type="button" data-unauthorized-logout class="btn btn-outline-secondary mt-3">Sign out</button>
  </section>

  <!-- Dashboard (shown once signed in + confirmed admin): sidebar + main content -->
  <div data-dashboard-view class="d-none container-fluid">
    <div class="row">
      <aside class="col-12 col-md-3 col-lg-2 admin-sidebar py-3">
        <nav class="nav nav-pills flex-row flex-md-column flex-wrap gap-1" aria-label="Content sections">
          <button type="button" data-admin-tab="site" class="nav-link active">Site</button>
          <button type="button" data-admin-tab="home" class="nav-link">Home</button>
          <button type="button" data-admin-tab="about" class="nav-link">About</button>
          <button type="button" data-admin-tab="projects" class="nav-link">Projects</button>
          <button type="button" data-admin-tab="blog" class="nav-link">Blog</button>
          <button type="button" data-admin-tab="gallery" class="nav-link">Gallery</button>
          <button type="button" data-admin-tab="contact" class="nav-link">Contact</button>
          <button type="button" data-admin-tab="testimonials" class="nav-link">Testimonials</button>
        </nav>
      </aside>
      <main data-admin-panel class="col-12 col-md-9 col-lg-10 admin-main py-4">
        <p class="text-body-secondary">Loading…</p>
      </main>
    </div>
  </div>

  <script type="module" src="assets/js/admin.js"></script>
</body>
</html>
